<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>글쓰기 — NEXTIAR</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>" />
  <style>
    .write-meta-bar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 1rem 0;
    }
    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 160px 160px 200px 120px;
      gap: 0.75rem;
      align-items: center;
    }
    .meta-grid input, .meta-grid select {
      padding: 0.5rem 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .meta-grid input:focus, .meta-grid select:focus { border-color: var(--accent); }
    .meta-grid input::placeholder { color: var(--text-faint); }
    .write-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      height: calc(100vh - 160px);
      min-height: 500px;
    }
    .editor-pane {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }
    .preview-pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .pane-header {
      padding: 0.6rem 1rem;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .toolbar {
      display: flex;
      gap: 0.3rem;
      padding: 0.5rem 0.75rem;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .tb {
      padding: 0.25rem 0.55rem;
      font-size: 0.78rem;
      font-weight: 600;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: var(--mono);
      transition: all 0.15s;
      white-space: nowrap;
    }
    .tb:hover { color: var(--accent); border-color: var(--accent); }
    .tb-sep { width: 1px; background: var(--border); margin: 0 0.1rem; align-self: stretch; }
    #editor {
      flex: 1;
      padding: 1.25rem;
      background: var(--bg);
      border: none;
      outline: none;
      font-family: var(--mono);
      font-size: 0.875rem;
      line-height: 1.75;
      color: var(--text);
      resize: none;
      width: 100%;
    }
    .preview-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
    }
    .write-footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      z-index: 100;
    }
    .write-hint {
      font-size: 0.8rem;
      color: var(--text-faint);
    }
    .write-hint code {
      font-family: var(--mono);
      background: var(--bg3);
      padding: 0.1em 0.4em;
      border-radius: 3px;
      font-size: 0.85em;
    }
    .char-count { font-size: 0.78rem; color: var(--text-faint); margin-left: auto; }
    @media (max-width: 768px) {
      .write-body { grid-template-columns: 1fr; }
      .preview-pane { display: none; }
      .meta-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div id="progress-bar"></div>

<nav class="nav">
  <a href="index.html" class="nav-logo">NEXT<span>IAR</span></a>
  <div class="nav-links">
    <a href="index.html">홈</a>
    <a href="blog.html">블로그</a>
    <a href="about.html">소개</a>
    <a href="write.html" class="nav-cta">✏️ 글쓰기</a>
  </div>
  <button class="nav-menu-btn" aria-label="메뉴"><span></span><span></span><span></span></button>
</nav>
<div class="mobile-menu">
  <a href="index.html">홈</a>
  <a href="blog.html">블로그</a>
  <a href="about.html">소개</a>
  <a href="write.html">✏️ 글쓰기</a>
</div>

<!-- 메타 정보 입력 -->
<div class="write-meta-bar pt-nav">
  <div class="container">
    <div class="meta-grid">
      <input id="post-title" placeholder="포스트 제목을 입력하세요" />
      <select id="post-category">
        <option value="finance">📈 금융투자</option>
        <option value="it">⚙️ IT 운영</option>
        <option value="system">🏗️ 시스템 구축</option>
      </select>
      <input id="post-tags" placeholder="태그 (쉼표 구분)" />
      <input id="post-id" placeholder="파일명 (영문, my-post)" />
      <input id="post-date" type="date" />
    </div>
  </div>
</div>

<!-- 에디터 / 미리보기 -->
<div class="write-body">
  <!-- 에디터 -->
  <div class="editor-pane">
    <div class="toolbar">
      <button class="tb" onclick="ins('## ', '')">H2</button>
      <button class="tb" onclick="ins('### ', '')">H3</button>
      <div class="tb-sep"></div>
      <button class="tb" onclick="ins('**', '**')"><b>B</b></button>
      <button class="tb" onclick="ins('*', '*')"><i>I</i></button>
      <button class="tb" onclick="ins('`', '`')">code</button>
      <div class="tb-sep"></div>
      <button class="tb" onclick="insBlock('```\n', '\n```')">``` 코드</button>
      <button class="tb" onclick="ins('> ', '')">인용</button>
      <button class="tb" onclick="ins('- ', '')">• 목록</button>
      <div class="tb-sep"></div>
      <button class="tb" onclick="insBlock('[info]\n', '\n[/info]')">ℹ️ 정보</button>
      <button class="tb" onclick="insBlock('[warn]\n', '\n[/warn]')">⚠️ 경고</button>
    </div>
    <div class="pane-header">
      마크다운 편집기
      <span class="char-count" id="char-count">0자</span>
    </div>
    <textarea id="editor" spellcheck="false" placeholder="## 소제목

본문을 마크다운 형식으로 작성하세요.

**굵게**, *기울임*, `인라인코드`

> 인용문

```
코드 블록
```

- 목록 항목 1
- 목록 항목 2
"></textarea>
  </div>

  <!-- 미리보기 -->
  <div class="preview-pane">
    <div class="pane-header">미리보기</div>
    <div class="preview-scroll">
      <div id="preview" class="post-content"></div>
    </div>
  </div>
</div>

<!-- 하단 액션 바 -->
<div class="write-footer">
  <button class="btn-primary" onclick="downloadPost()">📥 HTML 파일 다운로드</button>
  <span class="write-hint">
    다운로드 후 <code>posts/</code> 폴더에 넣고 GitHub에 업로드하면 블로그에 게시됩니다.
  </span>
</div>

<script src="assets/js/main.js"></script>
<script>
/* ─── 초기 날짜 설정 ─── */
document.getElementById('post-date').value = new Date().toISOString().split('T')[0];

/* ─── 에디터 실시간 미리보기 ─── */
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const charCount = document.getElementById('char-count');

editor.addEventListener('input', () => {
  preview.innerHTML = mdToHtml(editor.value);
  const wpm = 400;
  const words = editor.value.trim().split(/\s+/).length;
  const mins = Math.max(1, Math.round(words / wpm));
  charCount.textContent = `${editor.value.length}자 · 약 ${mins}분 읽기`;
});

/* ─── 마크다운 → HTML 변환기 ─── */
function mdToHtml(md) {
  if (!md.trim()) return '<p style="color:var(--text-faint)">본문을 입력하면 미리보기가 표시됩니다.</p>';

  const lines = md.split('\n');
  let html = '';
  let inUl = false, inOl = false, inCode = false, codeBuf = '', codeInInfo = false, codeInWarn = false;
  let inInfo = false, inWarn = false, infoBuf = '', warnBuf = '';

  const inline = t => t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>');

  const closeList = () => {
    if (inUl) { html += '</ul>\n'; inUl = false; }
    if (inOl) { html += '</ol>\n'; inOl = false; }
  };

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    /* 코드 블록 */
    if (line.startsWith('```')) {
      if (inCode) {
        html += `<pre><code>${codeBuf.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>\n`;
        codeBuf = ''; inCode = false;
      } else { closeList(); inCode = true; }
      continue;
    }
    if (inCode) { codeBuf += line + '\n'; continue; }

    /* 정보/경고 박스 */
    if (line.trim() === '[info]') { closeList(); inInfo = true; infoBuf = ''; continue; }
    if (line.trim() === '[/info]') {
      html += `<div class="info-box"><div class="info-box-title">ℹ️ 참고</div>${mdToHtml(infoBuf)}</div>\n`;
      inInfo = false; infoBuf = ''; continue;
    }
    if (inInfo) { infoBuf += line + '\n'; continue; }

    if (line.trim() === '[warn]') { closeList(); inWarn = true; warnBuf = ''; continue; }
    if (line.trim() === '[/warn]') {
      html += `<div class="warn-box"><div class="warn-box-title">⚠️ 주의</div>${mdToHtml(warnBuf)}</div>\n`;
      inWarn = false; warnBuf = ''; continue;
    }
    if (inWarn) { warnBuf += line + '\n'; continue; }

    /* 헤딩 */
    if (line.startsWith('## ')) {
      closeList();
      const text = line.slice(3);
      const id = text.toLowerCase().replace(/\s+/g,'-').replace(/[^\w-]/g,'');
      html += `<h2 id="${id}">${inline(text)}</h2>\n`;
    } else if (line.startsWith('### ')) {
      closeList();
      const text = line.slice(4);
      const id = text.toLowerCase().replace(/\s+/g,'-').replace(/[^\w-]/g,'');
      html += `<h3 id="${id}">${inline(text)}</h3>\n`;
    }
    /* 인용 */
    else if (line.startsWith('> ')) {
      closeList();
      html += `<blockquote>${inline(line.slice(2))}</blockquote>\n`;
    }
    /* 순서없는 목록 */
    else if (/^[-*] /.test(line)) {
      if (inOl) { html += '</ol>\n'; inOl = false; }
      if (!inUl) { html += '<ul>\n'; inUl = true; }
      html += `<li>${inline(line.slice(2))}</li>\n`;
    }
    /* 순서있는 목록 */
    else if (/^\d+\. /.test(line)) {
      if (inUl) { html += '</ul>\n'; inUl = false; }
      if (!inOl) { html += '<ol>\n'; inOl = true; }
      html += `<li>${inline(line.replace(/^\d+\. /,''))}</li>\n`;
    }
    /* 빈 줄 */
    else if (line.trim() === '') {
      closeList();
      html += '';
    }
    /* 일반 문단 */
    else {
      closeList();
      html += `<p>${inline(line)}</p>\n`;
    }
  }
  closeList();
  return html;
}

/* ─── 툴바 삽입 헬퍼 ─── */
function ins(before, after) {
  const sel = editor.selectionStart;
  const selEnd = editor.selectionEnd;
  const selected = editor.value.substring(sel, selEnd);
  const replacement = before + selected + after;
  editor.setRangeText(replacement, sel, selEnd, 'select');
  editor.focus();
  editor.dispatchEvent(new Event('input'));
}

function insBlock(before, after) {
  const sel = editor.selectionStart;
  const selEnd = editor.selectionEnd;
  const selected = editor.value.substring(sel, selEnd);
  const replacement = before + selected + after;
  editor.setRangeText(replacement, sel, selEnd, 'end');
  editor.focus();
  editor.dispatchEvent(new Event('input'));
}

/* ─── HTML 파일 생성 및 다운로드 ─── */
function downloadPost() {
  const title = document.getElementById('post-title').value.trim() || '제목 없음';
  const category = document.getElementById('post-category').value;
  const tagsRaw = document.getElementById('post-tags').value;
  const postId = document.getElementById('post-id').value.trim() || 'new-post-' + Date.now();
  const dateVal = document.getElementById('post-date').value || new Date().toISOString().split('T')[0];
  const content = editor.value;

  const words = content.trim().split(/\s+/).length;
  const readTime = Math.max(1, Math.round(words / 400));
  const dateFormatted = dateVal.replace(/-/g, '.');
  const dateKorean = `${dateVal.slice(0,4)}년 ${parseInt(dateVal.slice(5,7))}월 ${parseInt(dateVal.slice(8,10))}일`;

  const categoryLabel = { finance:'금융투자', it:'IT 운영', system:'시스템 구축' }[category] || category;
  const categoryClass = category;

  const tags = tagsRaw.split(',').map(t => t.trim()).filter(Boolean);
  const tagsHtml = `<span class="tag ${categoryClass}">${categoryLabel}</span>` +
    tags.map(t => `<span class="tag quant">${t}</span>`).join('');

  const contentHtml = mdToHtml(content);

  /* TOC 자동 생성 */
  const headingMatches = [...content.matchAll(/^(##|###) (.+)$/gm)];
  const tocHtml = headingMatches.map(m => {
    const level = m[1] === '##' ? '' : ' toc-h3';
    const text = m[2];
    const id = text.toLowerCase().replace(/\s+/g,'-').replace(/[^\w-]/g,'');
    return `<li${level ? ` class="${level.trim()}"` : ''}><a href="#${id}"${level ? ` class="${level.trim()}"` : ''}>${text}</a></li>`;
  }).join('\n        ');

  const html = `<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>${title} — NEXTIAR</title>
  <meta name="description" content="${title}" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>" />
</head>
<body data-post-id="${postId}">
<div id="progress-bar"></div>

<nav class="nav">
  <a href="../index.html" class="nav-logo">NEXT<span>IAR</span></a>
  <div class="nav-links">
    <a href="../index.html">홈</a>
    <a href="../blog.html">블로그</a>
    <a href="../about.html">소개</a>
    <a href="../write.html" class="nav-cta">✏️ 글쓰기</a>
  </div>
  <button class="nav-menu-btn" aria-label="메뉴"><span></span><span></span><span></span></button>
</nav>
<div class="mobile-menu">
  <a href="../index.html">홈</a>
  <a href="../blog.html">블로그</a>
  <a href="../about.html">소개</a>
</div>

<div class="post-header">
  <div class="container">
    <a href="../blog.html" class="back-link">← 블로그로 돌아가기</a>
    <div class="post-card-tags" style="margin-bottom:1rem;">
      ${tagsHtml}
    </div>
    <h1>${title}</h1>
    <div class="post-header-meta">
      <span>📅 ${dateKorean}</span>
      <span>⏱️ ${readTime}분 읽기</span>
      <span>👤 NEXTIAR</span>
    </div>
  </div>
</div>

<div class="container">
  <div class="post-layout">
    <article class="post-content">

${contentHtml}

      <div class="like-section">
        <p>이 글이 도움이 되었나요?</p>
        <button class="like-btn" aria-label="좋아요">
          <span class="like-icon">❤️</span>
          <span class="like-text">좋아요</span>
        </button>
        <div class="like-count-display">첫 번째로 좋아요를 눌러보세요</div>
      </div>

      <div class="share-section">
        <h4>공유하기</h4>
        <div class="share-btns">
          <button class="share-btn" data-share="copy">🔗 링크 복사</button>
          <button class="share-btn" data-share="twitter">🐦 트위터</button>
          <button class="share-btn" data-share="linkedin">💼 링크드인</button>
        </div>
      </div>

      <div class="comments-section">
        <h3>댓글</h3>
        <p style="color:var(--text-muted); font-size:0.875rem; margin-bottom:1.5rem;">
          GitHub 계정으로 댓글을 남길 수 있습니다.
        </p>
        <script
          src="https://utteranc.es/client.js"
          repo="nextiar/nextiar.github.io"
          issue-term="pathname"
          label="blog-comment"
          theme="github-light"
          crossorigin="anonymous"
          async>
        <\/script>
      </div>

    </article>

    <aside class="post-toc">
      <h4>목차</h4>
      <ul>
        ${tocHtml}
      </ul>
    </aside>
  </div>
</div>

<footer>
  <div class="container">
    <div class="footer-inner">
      <div class="footer-brand">
        <div style="font-size:1.1rem; font-weight:700; letter-spacing:0.05em; margin-bottom:0.75rem;">NEXT<span style="color:var(--accent)">IAR</span></div>
        <p style="font-size:0.85rem; color:var(--text-muted);">금융투자 지식과 IT 운영 노하우를<br />솔직하게 공유하는 공간입니다.</p>
      </div>
      <div class="footer-links">
        <a href="../index.html">홈</a>
        <a href="../blog.html">블로그</a>
        <a href="../about.html">소개</a>
      </div>
    </div>
    <div class="footer-bottom">
      <span>© 2025 NEXTIAR. All rights reserved.</span>
      <span>www.nextiar.net</span>
    </div>
  </div>
</footer>

<script src="../assets/js/main.js"><\/script>
</body>
</html>`;

  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${postId}.html`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast(`✅ ${postId}.html 다운로드 완료!`);
}
</script>
</body>
</html>
